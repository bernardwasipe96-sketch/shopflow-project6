      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # the nginx unprivileged user
      containers:
        - name: storefront
          image: 540361297327.dkr.ecr.us-east-1.amazonaws.com/shopflow-storefront:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
